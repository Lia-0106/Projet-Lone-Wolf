<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Création de personnage</title>
    <style>
        :root {
            --primary-color: #e89b00 ;
            --secondary-color: #282828 ;
            --third-color: #8b8b8b ;
            --fourth-color: #edcb88 ;
            --fifth-color: #131313 ;
            --text-color: #d7d7d7 ;
        }

        * {
            font-family: 'Times New Roman', 'serif';
            text-decoration: none ;
            color: var(--text-color) ;
        }

        body {
            background-color: var(--third-color);
            margin: 0 auto;
            padding: 15px;
            width: 55%;
            font-size: 20px;
        }

        .container {
            background-color: var(--secondary-color);
            padding: 2rem;
        }

        /* HEADER */
        header {
            background-color: var(--fifth-color);
            padding: 1.5rem 0;
            border-top-left-radius: 10px;
            border-top-right-radius: 10px;
            box-shadow: 0px 4px 20px rgba(0, 0, 0, 0.5);
        }

        header p {
            text-align: center;
            font-size: 36px;
            font-weight: 800;
            margin: 0;
        }

        header div {
            transition: 0.8s ease;
        }

        header div:hover {
            transform: scale(1.05);
        }

        header p:last-child {
            font-style: italic;
            margin-top: 0.8rem;
        }

        #game-output {
            background-color: var(--third-color);
            color: var(--fifth-color);
            padding: 15px;
            border: 2px solid var(--text-color);
            height: 200px;
            overflow-y: auto;
            margin: 0 auto 2rem auto;
            width: 95%;
        }

        #playerName {
            color: var(--fifth-color);
            font-size: 16px;
            margin-left: 10px;
            padding: 3px 5px;
            border-radius: 7px;
        }

        #discipline-choices a, #weapon-choices a {
            display: block;
            margin: 5px 0;
            color: var(--fifth-color);
            text-decoration: none;
        }
        #discipline-choices a:hover, #weapon-choices a:hover {
            text-decoration: underline;
        }
        #discipline-choices a.disabled {
            color: gray;
            pointer-events: none;
        }
        button {
            padding: 10px 20px;
            background-color: var(--primary-color);
            color: var(--fifth-color);
            cursor: pointer;
            border-radius: 15px;
            margin-left: 10px;
            border: none;
        }
        button:hover {
            background-color: var(--third-color);
        }
    </style>
</head>
<body>
    <header>
        <div>
            <p>Fire on the Water</p>
            <p>Joe Dever and Gary Chalk</p>
        </div>
    </header>
    <div class="container">
            
        <p>Création du personnage :</p>
        <div id="game-output"></div>

        <!-- Étape 1 : nom du joueur -->
        <div id="step-name">
            <label for="playerName">Nom du personnage :</label>
            <input type="text" id="playerName" placeholder="Entrez votre nom" />
            <button onclick="createPlayer()">OK</button>
        </div>

        <!-- Étape 2 : choix de l'arme -->
        <div id="step-weapon" style="display: none;">
            <p>Choisissez une arme :</p>
            <div id="weapon-choices"></div>
        </div>

        <!-- Étape 3 : choix des disciplines -->
        <div id="step-disciplines" style="display: none;">
            <p>Choisissez 6 disciplines :</p>
            <div id="discipline-choices"></div>
        </div>

        <button id="next-step" style="display: none;">Passer à l'étape suivante</button>
    </div>
    <footer>

    </footer>

    <script src="player_creation.js"></script>
</body>
</html>
