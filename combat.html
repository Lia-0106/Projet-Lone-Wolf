<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Combat</title>
    <style>
        :root {
            --primary-color: #e89b00 ;
            --secondary-color: #282828 ;
            --third-color: #8b8b8b ;
            --fourth-color: #edcb88 ;
            --fifth-color: #131313 ;
            --text-color: #d7d7d7 ;
        }

        * {
            font-family: 'Inter', 'sans-serif';
            text-decoration: none ;
            color: var(--text-color) ;
        }

        body {
            background-color: var(--third-color);
            margin: 0 auto;
            padding: 15px;
            width: 55%;
            font-size: 20px;
            font-weight: 500;
        }

        .container {
            background-color: var(--secondary-color);
            padding: 2rem;
            box-shadow: 4px 4px 10px rgba(0, 0, 0, 0.5);
        }

        /* HEADER */
        header {
            background-color: var(--fifth-color);
            padding: 1.5rem 0;
            border-top-left-radius: 10px;
            border-top-right-radius: 10px;
            box-shadow: 0px 4px 20px rgba(0, 0, 0, 0.5);
            z-index: 10;
            position: relative;
        }

        header p {
            font-family: 'Times New Roman', Times, serif;
            text-align: center;
            font-size: 36px;
            font-weight: 800;
            margin: 0;
        }

        header div {
            transition: 0.8s ease;
        }

        header div:hover {
            transform: scale(1.05);
        }

        header p:last-child {
            font-style: italic;
            margin-top: 0.8rem;
        }

        #game-output {
            background-color: var(--third-color);
            color: var(--fifth-color);
            padding: 15px;
            border: 2px solid var(--text-color);
            height: 200px;
            overflow-y: auto;
            margin: 0 auto 2rem auto;
            width: 95%;
            font-family: 'Courier New', Courier, monospace;
            font-size: 16px;
            transition: 0.5s ease;
            font-weight: 600;
            border-radius: 10px;
            box-shadow: 2px 2px 5px rgba(0, 0, 0, 0.25);
        }

        #game-output:hover {
            background-color: var(--text-color);
        }

        button {
            padding: 11px 20px;
            background-color: var(--primary-color);
            color: var(--fifth-color);
            cursor: pointer;
            border-radius: 15px;
            margin-left: 20px;
            border: none;
            font-weight: 600;
            transition: 0.5s ease;
        }
        button:hover {
            background-color: var(--third-color);
            transform: scale(1.05);
        }

        footer {
            padding: 0.5rem 2rem;
            background-color: var(--fifth-color);
            border-bottom-left-radius: 10px;
            border-bottom-right-radius: 10px;
        }

    </style>
</head>
<body>
    <header>
        <div>
            <p>Fire on the Water</p>
            <p>Joe Dever and Gary Chalk</p>
        </div>
    </header>
    <div class="container">

      <p>Fight section :</p>
      <div id="game-output"></div>
      
      <div>
        <input type="file" id="jsonFile" accept=".json" />
        <button onclick="loadFromStorage()">Load</button>
      </div>

      <button id=" ">Redirect to</button>
    </div>



    <footer class="footer"></footer>
    
    <script>
        document.getElementById('jsonFile').addEventListener('change', function(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();

            reader.onload = function(e) {
                try {
                    const content = e.target.result;
                    const jsonData = JSON.parse(content);
                    localStorage.setItem("player_autosave", JSON.stringify(jsonData));
                    document.getElementById('playerData').textContent = 
                        "JSON sauvegardé dans localStorage avec succès :\n\n" + JSON.stringify(jsonData, null, 2);
                } catch (error) {
                    alert("Erreur lors de la lecture du fichier JSON : " + error.message);
                }
            };

            reader.readAsText(file);
        });

        function loadFromStorage() {
            const saved = localStorage.getItem("player_autosave");
            if (saved) {
                document.getElementById('playerData').textContent =
                    "Données du joueur depuis localStorage :\n\n" + saved;
            } else {
                alert("Aucune donnée trouvée dans localStorage.");
            }
        }
    </script>
    <script type="module" src="./fight.js"></script>
    <script type="module" src="./addons.js"></script>
</body>
</html>
